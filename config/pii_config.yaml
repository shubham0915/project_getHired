# ============================================================================
# PII Configuration — Pattern Definitions, Thresholds & Severity
# ============================================================================
# This config drives the multi-layer detection pipeline.
# Add new patterns here without modifying core code.

# --------------------------------------------------------------------------
# Global Settings
# --------------------------------------------------------------------------
global:
  default_language: "en"
  max_validation_passes: 3          # Layer 3: max re-scan iterations
  gliner_model: "urchade/gliner_multi_pii-v1"  # Primary NER model
  gliner_threshold: 0.4             # Min confidence for GLiNER detections
  log_masked_only: true             # NEVER log raw PII values

# --------------------------------------------------------------------------
# Confidence Routing Thresholds (from Research File 15)
# --------------------------------------------------------------------------
confidence_routing:
  auto_redact: 0.8       # >= this: auto-redact, no review needed
  review_queue: 0.4      # >= this & < auto_redact: flag for review
  log_only: 0.0          # >= this & < review_queue: log for audit

# --------------------------------------------------------------------------
# Layer 1: Regex Patterns (Indian Fintech PII)
# --------------------------------------------------------------------------
# Order matters! Most specific patterns first (Research File 17)
regex_patterns:
  - name: "INDIAN_PAN"
    pattern: "\\b(?:[A-Z][\\s-]*){5}(?:[0-9][\\s-]*){4}[A-Z]\\b"
    severity: "CRITICAL"
    category: "GOVERNMENT_ID"
    description: "Indian Permanent Account Number (PAN) including obfuscated/spaced formats"
    faker_method: "pan"

  - name: "AADHAAR"
    pattern: "\\b[2-9]\\d{3}[\\s-]?\\d{4}[\\s-]?\\d{4}\\b"
    severity: "CRITICAL"
    category: "GOVERNMENT_ID"
    description: "Indian Aadhaar Number (12 digits, starts 2-9)"
    faker_method: "aadhaar"

  - name: "IFSC_CODE"
    pattern: "\\b[A-Z]{4}0[A-Z0-9]{6}\\b"
    severity: "HIGH"
    category: "FINANCIAL"
    description: "Indian Financial System Code"
    faker_method: "ifsc"

  - name: "CREDIT_CARD"
    pattern: "\\b(?:4[0-9]{12}(?:[0-9]{3})?|5[1-5][0-9]{14}|3[47][0-9]{13}|6(?:011|5[0-9]{2})[0-9]{12})\\b"
    severity: "CRITICAL"
    category: "FINANCIAL"
    description: "Credit/Debit Card Number (Visa, MC, Amex, Discover)"
    faker_method: "credit_card"

  - name: "EMAIL"
    pattern: "\\b[a-zA-Z0-9._%+\\-]+\\s*(?:@|\\(at\\)|\\[at\\])\\s*[a-zA-Z0-9.\\-]+\\s*(?:\\.|\\(dot\\)|\\[dot\\])\\s*[a-zA-Z]{2,}\\b"
    severity: "MEDIUM"
    category: "CONTACT"
    description: "Email Address including obfuscated formats like (at) and (dot)"
    faker_method: "email"

  - name: "UPI_ID"
    pattern: "\\b[a-zA-Z0-9.\\-_]+@(?:ybl|paytm|okhdfcbank|okicici|apl|upi|ibl|axl)\\b"
    severity: "HIGH"
    category: "FINANCIAL"
    description: "UPI Virtual Payment Address"
    faker_method: "upi_id"
    skip_if_matched: ["EMAIL"]

  - name: "INDIAN_PHONE"
    pattern: "\\b(?:\\+91[\\s-]?)?(?:0)?[6-9](?:[\\s.-]?\\d){9}\\b"
    severity: "MEDIUM"
    category: "CONTACT"
    description: "Indian Mobile Number (10 digits) including obfuscated formats with spaces or dots"
    faker_method: "phone_number"

  - name: "INDIAN_PINCODE"
    pattern: "\\b[1-9][0-9]{5}\\b"
    severity: "LOW"
    category: "LOCATION"
    description: "Indian PIN Code (6 digits)"
    faker_method: "pincode"

  - name: "DATE_OF_BIRTH"
    pattern: "\\b(?:0[1-9]|[12]\\d|3[01])[/\\-](?:0[1-9]|1[0-2])[/\\-](?:19|20)\\d{2}\\b"
    severity: "MEDIUM"
    category: "PERSONAL"
    description: "Date of Birth (DD/MM/YYYY or DD-MM-YYYY)"
    faker_method: "date_of_birth"

  - name: "INDIAN_PASSPORT"
    pattern: "\\b[A-Z][1-9]\\d{6}\\b"
    severity: "CRITICAL"
    category: "GOVERNMENT_ID"
    description: "Indian Passport Number"
    faker_method: "passport"

  - name: "INDIAN_VEHICLE"
    pattern: "\\b[A-Z]{2}[\\s-]?\\d{1,2}[\\s-]?[A-Z]{1,3}[\\s-]?\\d{4}\\b"
    severity: "LOW"
    category: "PERSONAL"
    description: "Indian Vehicle Registration Number"
    faker_method: "vehicle_registration"

  - name: "BANK_ACCOUNT"
    pattern: "\\b\\d{9,18}\\b"
    severity: "CRITICAL"
    category: "FINANCIAL"
    description: "Bank Account Number (9-18 digits)"
    faker_method: "bank_account"
    # Very broad pattern — only apply to columns likely to contain account numbers
    column_hint: ["Account_Number", "account_no", "acc_num"]

# --------------------------------------------------------------------------
# Layer 2: GLiNER Entity Labels (passed to predict_entities)
# --------------------------------------------------------------------------
gliner_labels:
  - "person"
  - "phone number"
  - "email"
  - "address"
  - "organization"
  - "bank account number"
  - "credit card number"
  - "date of birth"
  - "tax identification number"
  - "national id number"
  - "passport number"
  - "ip address"
  - "username"

# --------------------------------------------------------------------------
# Column-Type Hints (helps the pipeline make smarter decisions)
# --------------------------------------------------------------------------
column_hints:
  # Columns that are KNOWN to contain specific PII types
  # Pipeline will prioritize regex for these, skip broad patterns on others
  identity_columns: ["Name", "name", "Full_Name", "customer_name"]
  phone_columns: ["Phone_Number", "phone", "mobile", "contact"]
  email_columns: ["Email", "email", "email_id"]
  id_columns: ["PAN_Number", "PAN", "pan_no", "Aadhaar_Number", "aadhaar"]
  financial_columns: ["Account_Number", "account_no", "IFSC", "ifsc_code"]
  free_text_columns: ["Comments", "comments", "remarks", "notes", "description", "address", "Address"]
  numeric_columns: ["Amount", "amount", "Balance", "balance", "Transaction_Amount"]
  skip_columns: ["Transaction_ID", "Status", "Date", "Platform_Source"]

# --------------------------------------------------------------------------
# Severity Levels (from PII Tools documentation, Research File 10)
# --------------------------------------------------------------------------
severity_levels:
  CRITICAL:
    description: "Identity & Financial — immediate redaction required"
    color: "#f85149"
  HIGH:
    description: "Financial codes — high risk if combined with identity"
    color: "#d29922"
  MEDIUM:
    description: "Contact info — moderate risk"
    color: "#58a6ff"
  LOW:
    description: "Location/quasi-identifiers — risk only in combination"
    color: "#8b949e"
